syntax = "proto3";

package af.inference.v1;

import "common.proto";

option java_package = "ai.alternatefutures.inference.v1";
option go_package = "github.com/alternatefutures/af-inference-client/v1";

// ---------------------------------------------------------------------------
// af.inference.v1 — Shared Inference Cluster Service
//
// This proto defines the contract between:
//   CLIENT:  Rust runtime (tonic, via af-inference-client crate)
//   SERVER:  Ray Serve gRPC gateway fronting vLLM/SGLang/Claude-proxy deployments
//
// Design doc: docs/architecture/design/inference-cluster.md
// Issue:      alternatefutures/admin#132
// Coordinate: chief-architect (#136) owns the Dapr actor → af-inference-client call
//             semantics. argus (#133) owns the RestrictedPodGateway server impl.
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// InferenceService — primary service for all agent inference requests
// ---------------------------------------------------------------------------
service InferenceService {
  // Unary inference — agent sends request, awaits complete response.
  // Used for: orchestration planning, code generation, reasoning tasks.
  rpc Infer(InferenceRequest) returns (InferenceResponse);

  // Server-streaming inference — cluster streams tokens as they are generated.
  // Used for: long-form generation where the agent can begin acting on partial output.
  // OPEN QUESTION (chief-architect #136): Should this be bidirectional streaming
  // to support mid-generation cancellation from the Rust runtime? See design §8.2.
  rpc StreamInfer(InferenceRequest) returns (stream InferenceStreamChunk);

  // Health probe — used by the Rust runtime circuit breaker (design §7.3).
  // Returns cluster capacity state for each model.
  rpc ClusterHealth(ClusterHealthRequest) returns (ClusterHealthResponse);
}

// ---------------------------------------------------------------------------
// ClassificationService — direct access to the Qwen2.5-0.5B routing tier.
// Separated from InferenceService so the router can call it without recursion.
// ---------------------------------------------------------------------------
service ClassificationService {
  // Classify a request — returns model hint, task type, and sensitivity level.
  // Called by InferenceRouter before routing, and directly by the Rust runtime
  // for pre-classification before dispatch.
  rpc Classify(ClassifyRequest) returns (ClassifyResponse);
}

// ---------------------------------------------------------------------------
// RestrictedPodGateway — forwarding interface for RESTRICTED tasks.
// Server implementation is owned by argus (#133).
// Called by InferenceRouter; NOT called directly by the Rust runtime.
// See design §5.3 for isolation semantics.
// ---------------------------------------------------------------------------
service RestrictedPodGateway {
  // Forward a RESTRICTED inference request to the Tier A isolated pod.
  // The router does not inspect or log the content of the request beyond routing metadata.
  rpc ForwardToRestrictedPod(RestrictedInferenceRequest) returns (InferenceResponse);
}

// ---------------------------------------------------------------------------
// Request / Response messages
// ---------------------------------------------------------------------------

message InferenceRequest {
  // Unique request ID — generated by the Rust runtime (UUID v7 recommended for
  // time-ordered correlation with traces).
  string request_id = 1;

  // Agent identity
  string agent_id   = 2;  // instance ID of the requesting agent
  string agent_type = 3;  // role (e.g., "orchestrator", "code-agent", "marketing-agent")
  string tenant_id  = 4;  // billing/isolation tenant

  // Task context
  TaskType task_type              = 5;
  SensitivityLevel sensitivity    = 6;  // Set by Rust DSE before dispatch; UNSPECIFIED → cluster re-classifies
  HardwareTier preferred_tier     = 7;  // Advisory; cluster may override based on sensitivity

  // Model content
  string system_prompt   = 8;   // Agent persona + tool manifest (may be large; chunked prefill handles it)
  string user_prompt     = 9;   // The actual task/query

  // Generation parameters
  uint32 max_tokens      = 10;  // Hard cap on completion tokens
  float  temperature     = 11;  // 0.0–1.0; 0.0 for classification/deterministic
  repeated string stop_sequences = 12;

  // Routing hints (set by Rust runtime; may be overridden by InferenceRouter)
  ModelId preferred_model  = 13;  // Advisory; router may override based on budget/capacity
  bool    require_streaming = 14; // If true, use StreamInfer semantics even for Infer RPC (buffered)

  // KV cache namespace — populated by InferenceRouter; Rust runtime leaves blank.
  KVNamespaceKey kv_namespace = 15;

  // Tracing
  string trace_id = 16;   // OpenTelemetry trace ID for distributed tracing correlation
  string span_id  = 17;   // Parent span ID
}

message InferenceResponse {
  string request_id   = 1;
  string agent_id     = 2;
  string tenant_id    = 3;

  // Model that handled this request
  ModelId model_id        = 4;
  HardwareTier served_by  = 5;

  // Response content
  string content = 6;  // Full completion text

  // Usage and cost
  TokenUsage usage = 7;

  // Routing metadata (for debugging and cost attribution)
  RoutingMetadata routing = 8;

  // Latency breakdown (milliseconds)
  uint64 queue_wait_ms        = 9;
  uint64 prefill_ms           = 10;
  uint64 generation_ms        = 11;
  uint64 total_ms             = 12;

  // Error, if any
  InferenceError error = 13;
}

// Streamed token chunk (for StreamInfer)
message InferenceStreamChunk {
  string request_id = 1;
  string delta      = 2;   // Incremental token text
  bool   is_final   = 3;   // True on the last chunk
  // Usage is only populated on the final chunk (is_final = true)
  TokenUsage usage  = 4;
  InferenceError error = 5;
}

// Internal routing metadata attached to every response (not user-facing content)
message RoutingMetadata {
  // Original classification result (before any router override)
  ModelId   classifier_hint         = 1;
  float     classifier_confidence   = 2;
  // Whether the router overrode the classifier's model hint
  bool      model_hint_overridden   = 3;
  string    override_reason         = 4;  // e.g., "claude_budget_exhausted", "kimi_circuit_open"
  // KV cache stats (populated from vLLM response metadata)
  bool      kv_cache_hit            = 5;
  uint32    kv_cache_hit_blocks     = 6;
  uint32    kv_cache_total_blocks   = 7;
}

// Error details returned inline (not as gRPC status codes) for structured handling
message InferenceError {
  InferenceErrorCode code    = 1;
  string             message = 2;
  bool               retryable = 3;
}

enum InferenceErrorCode {
  INFERENCE_ERROR_CODE_UNSPECIFIED    = 0;
  INFERENCE_ERROR_CODE_NONE           = 1;  // No error (response is valid)
  INFERENCE_ERROR_CODE_BUDGET_EXHAUSTED = 2;  // Claude budget gate triggered
  INFERENCE_ERROR_CODE_CLUSTER_FULL   = 3;  // All vLLM slots occupied (RESOURCE_EXHAUSTED)
  INFERENCE_ERROR_CODE_CIRCUIT_OPEN   = 4;  // Circuit breaker open on target model
  INFERENCE_ERROR_CODE_TIMEOUT        = 5;  // Generation deadline exceeded
  INFERENCE_ERROR_CODE_OOM            = 6;  // GPU OOM on serving replica
  INFERENCE_ERROR_CODE_CONTENT_FILTER = 7;  // Request blocked by safety filter
  INFERENCE_ERROR_CODE_INTERNAL       = 8;  // Cluster internal error (retry advised)
}

// ---------------------------------------------------------------------------
// ClassificationService messages
// ---------------------------------------------------------------------------

message ClassifyRequest {
  string request_id  = 1;
  string tenant_id   = 2;
  string agent_type  = 3;
  string prompt      = 4;  // Full prompt text to classify (system + user)
  // Current DSE sensitivity label (if already set; UNSPECIFIED to let classifier decide)
  SensitivityLevel known_sensitivity = 5;
}

message ClassifyResponse {
  string request_id              = 1;
  TaskType task_type             = 2;
  ModelId  model_hint            = 3;
  EstimatedComplexity complexity = 4;
  SensitivityLevel sensitivity   = 5;
  float confidence               = 6;  // [0.0, 1.0] classifier confidence
}

enum EstimatedComplexity {
  ESTIMATED_COMPLEXITY_UNSPECIFIED = 0;
  ESTIMATED_COMPLEXITY_LOW        = 1;
  ESTIMATED_COMPLEXITY_MEDIUM     = 2;
  ESTIMATED_COMPLEXITY_HIGH       = 3;
}

// ---------------------------------------------------------------------------
// RestrictedPodGateway messages
// ---------------------------------------------------------------------------

// Stripped-down request for RESTRICTED tasks.
// Content (system_prompt, user_prompt) is transmitted only over mTLS to Tier A.
// The InferenceRouter forwards the full InferenceRequest; this message represents
// the routing envelope visible to logging/metrics systems outside the restricted boundary.
message RestrictedInferenceRequest {
  string request_id    = 1;
  string agent_id      = 2;
  string agent_type    = 3;
  string tenant_id     = 4;
  // OPEN QUESTION (argus #133): Does argus need additional fields here?
  // e.g., clearance_level, compartment_id for multi-compartment RESTRICTED isolation.
  // See design doc §12 OQ-D.

  // The actual content is carried in the embedded InferenceRequest.
  // It is transmitted only over the mTLS channel to the Tier A pod.
  InferenceRequest inner = 5;
}

// ---------------------------------------------------------------------------
// ClusterHealth messages
// ---------------------------------------------------------------------------

message ClusterHealthRequest {
  // Empty — request current capacity state for all models
}

message ClusterHealthResponse {
  repeated ModelCapacity models = 1;
  // Cluster-wide circuit breaker state
  CircuitBreakerState claude_circuit = 2;
  CircuitBreakerState kimi_circuit   = 3;
}

message ModelCapacity {
  ModelId model_id             = 1;
  uint32  active_sequences     = 2;  // Currently running
  uint32  max_sequences        = 3;  // Configured max_num_seqs (total across replicas)
  uint32  queue_depth          = 4;  // Waiting to be scheduled
  bool    healthy              = 5;
  // Budget remaining (Claude only)
  uint64  budget_tokens_remaining = 6;
}

enum CircuitBreakerState {
  CIRCUIT_BREAKER_STATE_UNSPECIFIED = 0;
  CIRCUIT_BREAKER_STATE_CLOSED      = 1;  // Normal operation
  CIRCUIT_BREAKER_STATE_HALF_OPEN   = 2;  // Testing recovery
  CIRCUIT_BREAKER_STATE_OPEN        = 3;  // Failing — requests rejected
}
