// proto/af-swarm/a2a_gateway.proto
//
// A2A (Agent-to-Agent) protocol gateway.
// External-facing; preserves the v3.0 spec (DO NOT modify the A2A contract).
// See v3.0 §3.3 for the full A2A spec and Agent Card format.
//
// STATUS: UNCHANGED from v3.0 per RFC §2 Phase 14 (status: UNCHANGED).
// This file documents the A2A contract; does NOT change it.
//
// NOTE: The A2A protocol is HTTP-first (REST + SSE), not gRPC.
// This proto file captures the message types as a canonical reference.
// The actual implementation uses axum (Rust) with JSON serialization.
//
// HTTP endpoints (REST):
//   GET  /.well-known/agent.json       → AgentCard
//   POST /a2a/tasks/send               → TaskSendRequest → TaskSendResponse
//   GET  /a2a/tasks/{id}               → SSE stream of TaskEvent
//   POST /a2a/tasks/{id}/cancel        → TaskCancelRequest → TaskCancelResponse
//
// A2A gateway translates external requests into internal TaskDispatch messages
// via OrchestratorActor. The internal task format is transport-agnostic.
//
// Integration contract: docs/architecture/design/integration-contract.md §3.4

syntax = "proto3";

package af.swarm.v1;

option java_package = "ai.alternatefutures.swarm.v1";
option go_package = "github.com/alternatefutures/swarm/v1";

import "google/protobuf/timestamp.proto";
import "proto/af-swarm/common.proto";

// ---------------------------------------------------------------------------
// Agent Card (/.well-known/agent.json)
// Auto-generated from TOML agent configs.
// Format follows Google A2A spec v1.0.
// ---------------------------------------------------------------------------

message AgentCard {
  string name = 1;
  string description = 2;
  // Public URL of the A2A gateway. e.g. "https://agents.alternatefutures.ai"
  string url = 3;
  // Protocol version. "1.0" per v3.0 §3.3.
  string version = 4;
  AgentCapabilities capabilities = 5;
  repeated AgentSkill skills = 6;
  AgentAuthentication authentication = 7;
  // AF-specific extensions (not part of Google A2A spec).
  AfAgentExtensions af_extensions = 8;
}

message AgentCapabilities {
  bool streaming = 1;
  bool push_notifications = 2;
  // Whether this agent can spawn sub-agents (sub-agent delegation).
  bool sub_agent_delegation = 3;
}

message AgentSkill {
  string id = 1;
  string name = 2;
  string description = 3;
  // Example prompts (up to 3).
  repeated string examples = 4;
  // DSE sensitivity level of this skill's typical output.
  SensitivityLevel output_sensitivity = 5;
}

message AgentAuthentication {
  // Supported schemes: "oauth2", "apiKey", "bearer"
  repeated string schemes = 1;
}

// AF-specific extensions on AgentCard. Not part of Google A2A spec.
message AfAgentExtensions {
  // Max tools this agent supports (<= 16 per RFC §1.6).
  uint32 max_tools = 1;
  // Agent persona name (e.g. "lyra", "senku", "nori").
  string persona = 2;
  // Team assignment (e.g. "marketing", "code").
  string team = 3;
  // Whether this agent is available for external marketplace use.
  bool marketplace_listed = 4;
}

// ---------------------------------------------------------------------------
// Task submission (POST /a2a/tasks/send)
// ---------------------------------------------------------------------------

message A2ATaskSendRequest {
  // External-facing task ID. UUIDv7. Generated by the caller.
  string task_id = 1;
  // Target agent name. Must match a registered AgentCard.name.
  string agent_name = 2;
  // User message to the agent.
  string message = 3;
  // Additional context (JSON string).
  string context_json = 4;
  // Whether the caller wants streaming SSE results.
  bool streaming = 5;
  // Caller-provided metadata (key-value pairs).
  map<string, string> metadata = 6;
  TraceContext trace_context = 7;
}

// Immediate response to POST /a2a/tasks/send.
// Does NOT contain the result — result comes via SSE (GET /a2a/tasks/{id}).
message A2ATaskSendResponse {
  string task_id = 1;
  A2ATaskStatus status = 2;
  // SSE URL for streaming results. e.g. "/a2a/tasks/{task_id}"
  string sse_url = 3;
  google.protobuf.Timestamp accepted_at = 4;
}

// ---------------------------------------------------------------------------
// SSE task events (GET /a2a/tasks/{id})
// Server-sent events; each event is a JSON-serialized A2ATaskEvent.
// ---------------------------------------------------------------------------

message A2ATaskEvent {
  string task_id = 1;
  A2ATaskStatus status = 2;
  oneof event {
    A2AProgressEvent progress = 3;
    A2AResultEvent result = 4;
    A2AErrorEvent error = 5;
  }
  google.protobuf.Timestamp event_at = 6;
}

enum A2ATaskStatus {
  A2A_TASK_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  COMPLETED = 3;
  FAILED = 4;
  CANCELLED = 5;
}

message A2AProgressEvent {
  string message = 1;
  // 0–100 progress percentage (optional).
  uint32 progress_pct = 2;
}

message A2AResultEvent {
  string content = 1;
  // Structured output (JSON).
  string output_json = 2;
  // Token usage (for metering external callers).
  TokenUsage token_usage = 3;
}

message A2AErrorEvent {
  string error_code = 1;
  string message = 2;
  bool retryable = 3;
}

// ---------------------------------------------------------------------------
// Cancellation (POST /a2a/tasks/{id}/cancel)
// ---------------------------------------------------------------------------

message A2ATaskCancelRequest {
  string task_id = 1;
  string reason = 2;
  TraceContext trace_context = 3;
}

message A2ATaskCancelResponse {
  bool cancelled = 1;
  string status = 2;
}

// ---------------------------------------------------------------------------
// Gateway service (internal: A2A gateway → OrchestratorActor)
// The A2A HTTP handlers call this service to dispatch tasks internally.
// This is NOT exposed externally — it is an internal gRPC service between
// the A2A gateway process and the OrchestratorActor.
// todo!()
// ---------------------------------------------------------------------------
service A2AGatewayInternalService {
  // Translate an A2A task submission into an internal TaskDispatch.
  // todo!()
  rpc DispatchFromA2A(A2ATaskSendRequest) returns (A2ATaskSendResponse);

  // Cancel a task dispatched via A2A.
  // todo!()
  rpc CancelFromA2A(A2ATaskCancelRequest) returns (A2ATaskCancelResponse);

  // Subscribe to task result events (internal SSE source).
  // todo!()
  rpc SubscribeTaskEvents(A2ATaskEventSubscribeRequest) returns (stream A2ATaskEvent);
}

message A2ATaskEventSubscribeRequest {
  string task_id = 1;
  TraceContext trace_context = 2;
}
