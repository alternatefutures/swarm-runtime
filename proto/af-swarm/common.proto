// proto/af-swarm/common.proto
//
// Shared types used across all AF Swarm Runtime services.
// Wire encoding: prost (Rust). Package: af.swarm.v1.
//
// IMPORTANT: Field numbers are IMMUTABLE once assigned.
// Adding new optional fields within a version is non-breaking.
// Changing field numbers, types, or removing fields requires a version bump.
//
// Integration contract: docs/architecture/design/integration-contract.md §3, §4.5

syntax = "proto3";

package af.swarm.v1;

option java_package = "ai.alternatefutures.swarm.v1";
option go_package = "github.com/alternatefutures/swarm/v1";

import "google/protobuf/timestamp.proto";

// ---------------------------------------------------------------------------
// Identity types
// ---------------------------------------------------------------------------

// Canonical agent identity. UUIDv7 string (time-ordered).
// Rust newtype: AgentId(Uuid) in crates/af-swarm-types.
message AgentId {
  string value = 1;
}

// Canonical task identity. UUIDv7 string (time-ordered).
// Rust newtype: TaskId(Uuid) in crates/af-swarm-types.
message TaskId {
  string value = 1;
}

// Tenant identity (org or user account). UUIDv4 string.
message TenantId {
  string value = 1;
}

// Dapr workflow instance identity.
message WorkflowInstanceId {
  string value = 1;
}

// ---------------------------------------------------------------------------
// Sensitivity / tier classification
// See integration-contract.md §1.3 for disambiguation of "tier".
// ---------------------------------------------------------------------------

// DSE sensitivity level. Monotonically escalating taint.
// Do NOT confuse with hardware trust tier (Tier A/B/C).
enum SensitivityLevel {
  SENSITIVITY_LEVEL_UNSPECIFIED = 0;
  PUBLIC = 1;
  INTERNAL = 2;
  SENSITIVE = 3;
  RESTRICTED = 4;  // Routes to RESTRICTED POD (Tier A hardware).
                   // Never routes to OPEN POOL under any failure mode.
}

// Canonical lowercase string mapping for KV cache namespace keys (CL-004 RESOLVED):
//   PUBLIC     => "public"
//   INTERNAL   => "internal"
//   SENSITIVE  => "sensitive"
//   RESTRICTED => "restricted"  (and kv_cache_namespace MUST be empty string — no cache sharing)
// Key format: "{tenant_id}:{dse_tier}:{team_id}"
//   tenant_id: UUIDv4 string from TenantId
//   dse_tier:  lowercase proto enum name as above
//   team_id:   optional team scope; empty string if not applicable
// Amendment to this scheme requires explicit sign-off from integration-contract owner.

// Inference pool target. Maps from SensitivityLevel at dispatch time.
// RESTRICTED sensitivity => InferenceTier.RESTRICTED_POD.
// All others => InferenceTier.OPEN_POOL.
enum InferenceTier {
  INFERENCE_TIER_UNSPECIFIED = 0;
  OPEN_POOL = 1;    // Tier C hardware (Akash). Kimi K2.5.
  RESTRICTED_POD = 2; // Tier A hardware (AWS/GCP). Claude API proxy.
}

// Task priority. Orchestrator dispatch queue ordering.
enum TaskPriority {
  TASK_PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  NORMAL = 2;
  HIGH = 3;
}

// ---------------------------------------------------------------------------
// OpenTelemetry trace context
// See integration-contract.md §4.1 for propagation rules.
// ---------------------------------------------------------------------------

// W3C Trace Context (https://www.w3.org/TR/trace-context/).
// Must be propagated across ALL process boundaries.
// Attribute af.sensitivity.tier MUST NOT contain RESTRICTED data payloads.
message TraceContext {
  // W3C traceparent header value. e.g. "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
  string traceparent = 1;
  // W3C tracestate header value. May be empty.
  string tracestate = 2;
  // AF-specific baggage. Key-value pairs propagated through the trace.
  // Required keys: af.agent.id, af.tenant.id, af.task.id, af.sensitivity.tier
  map<string, string> baggage = 3;
}

// ---------------------------------------------------------------------------
// Error types
// See integration-contract.md §4.3 for canonical error code table.
// ---------------------------------------------------------------------------

// AF application error detail. Attached to gRPC Status details.
message AfErrorDetail {
  // AF error code string. e.g. "AF-006" (RESTRICTED POD unavailable).
  string error_code = 1;
  // Human-readable error message. Safe to log; must not contain RESTRICTED data.
  string message = 2;
  // Retry hint. False for AF-006 (must never retry against OPEN POOL).
  bool retryable = 3;
  // Structured context for programmatic handling.
  map<string, string> context = 4;
}

// ---------------------------------------------------------------------------
// Agent snapshot (durable state across freeze/hydrate cycles)
// See integration-contract.md §5 CL-003 for wire format decisions.
// Logical schema owned by Lain (#137 §4.2); encoding owned by Quinn (#134).
// ---------------------------------------------------------------------------

// Durable agent state persisted to Dapr state store.
// Storage encoding: JSON (Dapr state store) — see CL-003.
// Wire encoding for cross-machine transfer: prost (this message).
message AgentSnapshot {
  AgentId agent_id = 1;
  TenantId tenant_id = 2;
  // Monotonically increasing schema version. Used by SnapshotMigrationRegistry.
  uint32 snapshot_version = 3;
  google.protobuf.Timestamp frozen_at = 4;
  // Serialized working memory (MemAgent slots). Encoding: JSON blob.
  // RESTRICTED-tier agents: this bytes field is FHE-encrypted before Dapr write.
  bytes working_memory = 5;
  // Pending tasks not yet started. Survived the freeze.
  repeated TaskId pending_task_ids = 6;
  // Agent-specific config overrides (JSON). Merged with base TOML config on hydration.
  bytes config_delta = 7;
  // Dapr ETag for optimistic concurrency. Set by Dapr on read; passed back on write.
  // Not persisted inside the snapshot — managed by DaprStateClient.
  string etag = 8;  // Only present in transfer; stripped before Dapr write.
  // HMAC-SHA256 over canonical serialization of snapshot fields excluding etag and
  // integrity_hmac itself. Verified on every read; mismatch => AF-099 + quarantine.
  // Key rotation per Argus #138 §3.4. See PR #143 for HMAC key scheme.
  bytes integrity_hmac = 9;
}

// Transfer envelope for cross-machine AgentSnapshot migration (L3 NATS).
message AgentSnapshotTransfer {
  AgentSnapshot snapshot = 1;
  TraceContext trace_context = 2;
  // Source node ID. UUIDv7.
  string source_node_id = 3;
  // Destination node ID. UUIDv7.
  string destination_node_id = 4;
}
